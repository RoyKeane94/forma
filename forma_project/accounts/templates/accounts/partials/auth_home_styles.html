<style>
  :root{
    --blue:#1f49d6;
    --blue-deep:#16339b;
    --blue-light:#eef3ff;
    --ink:#0e0f12;
    --slate:#5c5f66;
    --rule:#ebebe9;
  }
  html,body{margin:0;padding:0;}
  @keyframes authFadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .auth-anim-1 { animation: authFadeUp 0.65s ease both; animation-delay: 0.05s; }
  .auth-anim-2 { animation: authFadeUp 0.65s ease both; animation-delay: 0.18s; }
  .auth-anim-3 { animation: authFadeUp 0.65s ease both; animation-delay: 0.30s; }

  .auth-page{background:#fff;color:var(--ink);font-family:'Instrument Sans',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;min-height:calc(100vh - 62px);padding:9.5rem 0 5rem;}
  .auth-page a{color:inherit;}
  .auth-page .wrap{width:85%;max-width:28rem;margin:0 auto;padding:0;}
  .auth-page .label{font-size:0.7rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--slate);margin-bottom:1.1rem;}
  .auth-page .label.blue{color:var(--blue);}
  .auth-page h1{font-size:clamp(2.2rem,5vw,3.2rem);font-weight:500;letter-spacing:-0.025em;line-height:1.06;margin:0 0 1rem;}
  .auth-page .lede{font-size:1.02rem;line-height:1.7;color:var(--slate);margin:0 0 2.2rem;}
  .auth-page .field{margin-bottom:1.35rem;}
  .auth-page .field label{display:block;font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);margin-bottom:0.45rem;}
  .auth-page .field .errorlist{list-style:none;margin:0.45rem 0 0;padding:0;font-size:0.82rem;color:var(--slate);}
  .auth-page .forma-input,
  .auth-page input[type="text"],
  .auth-page input[type="email"],
  .auth-page input[type="password"]{width:100%;border:1px solid var(--rule);background:#fff;border-radius:0.55rem;padding:0.85rem 1rem;font-family:inherit;font-size:0.95rem;color:var(--ink);transition:border-color 0.15s,box-shadow 0.15s;}
  .auth-page .forma-input:focus,
  .auth-page input[type="text"]:focus,
  .auth-page input[type="email"]:focus,
  .auth-page input[type="password"]:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(31,73,214,0.08);}
  .auth-page .terms{display:flex;align-items:flex-start;gap:0.65rem;margin-bottom:1.6rem;}
  .auth-page .terms label{font-size:0.88rem;line-height:1.65;color:var(--slate);font-weight:400;letter-spacing:0;text-transform:none;cursor:pointer;}
  .auth-page .terms a{color:var(--blue);text-decoration:none;border-bottom:1px solid rgba(31,73,214,0.25);}
  .auth-page .terms a:hover{border-color:var(--blue);}
  .auth-page .terms input[type="checkbox"]{margin-top:0.2rem;accent-color:var(--blue);}
  .auth-page .alert{border:1px solid var(--rule);background:var(--blue-light);border-radius:0.75rem;padding:1rem 1.1rem;margin-bottom:1.5rem;}
  .auth-page .alert-title{font-size:0.7rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue);margin:0 0 0.55rem;}
  .auth-page .alert ul{list-style:none;margin:0;padding:0;font-size:0.88rem;line-height:1.65;color:var(--slate);}
  .auth-page .btn{display:inline-flex;align-items:center;background:var(--blue);color:#fff;text-decoration:none;border:none;border-radius:999px;padding:0.9rem 1.8rem;font-family:inherit;font-size:0.92rem;font-weight:500;cursor:pointer;transition:background 0.15s;}
  .auth-page .btn:hover{background:var(--blue-deep);}
  .auth-page .btn-outline{background:transparent;color:var(--ink);border:1px solid var(--rule);}
  .auth-page .btn-outline:hover{background:var(--blue-light);border-color:var(--blue);color:var(--ink);}
  .auth-page .access-note{margin:1.8rem 0 1.2rem;padding-top:1.6rem;border-top:1px solid var(--rule);font-size:0.92rem;line-height:1.65;color:var(--slate);}
  .auth-page .access-note p{margin:0;}
  .auth-page .form-actions{display:flex;flex-wrap:wrap;align-items:center;gap:1rem;}
  .auth-page .switch{margin-top:2rem;padding-top:1.6rem;border-top:1px solid var(--rule);font-size:0.92rem;color:var(--slate);}
  .auth-page .textlink{font-weight:500;text-decoration:none;border-bottom:1px solid var(--rule);padding-bottom:2px;}
  .auth-page .textlink:hover{border-color:var(--ink);color:var(--ink);}
  .auth-page .hidden{display:none;}
  .auth-page :focus-visible{outline:2px solid var(--blue);outline-offset:3px;}

  .home-nav{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 7.5%;background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);}
  .home-nav .forma-logo{display:inline-flex;align-items:center;color:var(--ink);text-decoration:none;flex-shrink:0;}
  .home-nav .forma-logo__svg{display:block;height:1.35rem;width:auto;}
  .home-nav .links{display:flex;align-items:center;gap:1.8rem;font-size:0.88rem;font-weight:500;}
  .home-nav .links a{text-decoration:none;color:var(--slate);}
  .home-nav .links a:hover{color:var(--ink);}
  .home-nav .links a.cta{color:#fff;background:var(--ink);border-radius:999px;padding:0.6rem 1.3rem;}
  .home-nav .links a.cta:hover{background:var(--blue);color:#fff;}
  .home-nav .links form{display:inline;margin:0;}
  .home-nav .links .logout-btn{display:inline-flex;align-items:center;border:1px solid var(--rule);background:transparent;color:var(--ink);border-radius:999px;padding:0.6rem 1.3rem;font-family:inherit;font-size:0.88rem;font-weight:500;cursor:pointer;transition:background 0.15s,border-color 0.15s,color 0.15s;}
  .home-nav .links .logout-btn:hover{background:var(--blue-light);border-color:var(--blue);color:var(--ink);}
  {% include "partials/home_nav_menu_styles.html" %}

  .home-footer{border-top:1px solid var(--rule);padding:1.7rem 7.5%;background:#fff;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem;}
  .home-footer .forma-logo{display:inline-flex;align-items:center;color:var(--ink);}
  .home-footer .forma-logo__svg{display:block;height:1.15rem;width:auto;}
  .home-footer .legal{display:flex;gap:1.5rem;font-size:0.78rem;color:var(--slate);}
  .home-footer .legal a{text-decoration:none;color:var(--slate);}
  .home-footer .legal a:hover{color:var(--ink);}

  .account-page{background:#fff;color:var(--ink);font-family:'Instrument Sans',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;min-height:calc(100vh - 62px);padding:2.5rem 0 5rem;}
  .account-page a{color:inherit;}
  .account-page .wrap{width:85%;max-width:none;margin:0 auto;padding:0;}
  .account-page .label{font-size:0.7rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--slate);margin-bottom:1.1rem;}
  .account-page .label.blue{color:var(--blue);}
  .account-page h1{font-size:clamp(2.2rem,5vw,3.2rem);font-weight:500;letter-spacing:-0.025em;line-height:1.06;margin:0 0 1rem;}
  .account-page h2{font-size:clamp(1.6rem,3vw,2.2rem);font-weight:500;letter-spacing:-0.025em;line-height:1.1;margin:0 0 1rem;}
  .account-page .lede{font-size:1.02rem;line-height:1.7;color:var(--slate);margin:0 0 2rem;}
  .account-page .grid{display:grid;gap:3rem;}
  @media(min-width:960px){.account-page .grid{grid-template-columns:minmax(0,1fr) 14rem;align-items:start;}}
  .account-page .card{border:1px solid var(--rule);border-radius:1.6rem;padding:2rem;margin-bottom:1.5rem;}
  .account-page .card-label{font-size:0.7rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue);margin:0 0 0.75rem;}
  .account-page .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin:1.25rem 0;}
  .account-page .stat{border:1px solid var(--rule);border-radius:1rem;padding:1rem 1.1rem;background:var(--blue-light);}
  .account-page .stat-value{font-size:2rem;font-weight:500;letter-spacing:-0.03em;line-height:1;margin:0;}
  .account-page .stat-label{margin:0.35rem 0 0;font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--slate);}
  .account-page .actions{display:flex;flex-wrap:wrap;gap:1rem;margin:1.25rem 0;}
  .account-page .btn{display:inline-flex;align-items:center;background:var(--blue);color:#fff;text-decoration:none;border:none;border-radius:999px;padding:0.75rem 1.4rem;font-family:inherit;font-size:0.88rem;font-weight:500;cursor:pointer;transition:background 0.15s;}
  .account-page .btn:hover{background:var(--blue-deep);color:#fff;}
  .account-page .textlink{font-size:0.92rem;font-weight:500;text-decoration:none;border-bottom:1px solid var(--rule);padding-bottom:2px;color:var(--ink);}
  .account-page .textlink:hover{border-color:var(--blue);color:var(--blue);}
  .account-page .field-label{margin:1.5rem 0 0.45rem;font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);}
  .account-page .field-help{margin:0 0 0.75rem;font-size:0.92rem;line-height:1.65;color:var(--slate);}
  .account-page .link-row{display:flex;align-items:stretch;gap:0.65rem;margin-bottom:0.5rem;}
  .account-page .link-box{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border:1px solid var(--rule);border-radius:0.75rem;background:#fff;padding:0.85rem 1rem;font-size:0.88rem;color:var(--blue);text-decoration:none;transition:background 0.15s,border-color 0.15s;}
  .account-page .link-box:hover{background:var(--blue-light);border-color:rgba(31,73,214,0.25);}
  .account-page .copy-btn{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--rule);background:#fff;border-radius:999px;padding:0.75rem 1.1rem;font-family:inherit;font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink);cursor:pointer;transition:background 0.15s,border-color 0.15s;}
  .account-page .copy-btn:hover{background:var(--blue-light);border-color:var(--blue);}
  .account-page .note{margin:1.25rem 0 0;font-size:0.94rem;line-height:1.65;color:var(--ink);}
  .account-page .review-alert{border:1px solid #d8e2ff;border-radius:1rem;background:var(--blue-light);padding:1.15rem 1.25rem;margin:0 0 1.5rem;}
  .account-page .review-alert-label{margin:0 0 0.45rem;font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue);}
  .account-page .review-alert-text{margin:0;font-size:0.95rem;line-height:1.6;color:var(--ink);}
  .account-page .review-alert-actions{margin:1rem 0 0;}
  .account-page .sidebar{padding-top:0.5rem;}
  @media(min-width:960px){.account-page .sidebar{border-left:1px solid var(--rule);padding-left:2rem;}}
  @media(max-width:959px){.account-page .sidebar{border-top:1px solid var(--rule);padding-top:2rem;}}
  .account-page .sidebar-nav{display:flex;flex-direction:column;gap:0.9rem;margin-top:0.75rem;}
  .account-page .sidebar-nav a{font-size:0.92rem;color:var(--slate);text-decoration:none;border-bottom:1px solid var(--rule);padding-bottom:2px;width:fit-content;}
  .account-page .sidebar-nav a:hover{color:var(--ink);border-color:var(--ink);}
  .account-page .sidebar-nav a.danger:hover{color:#b42318;border-color:rgba(180,35,24,0.35);}
  .account-page .sidebar-logout-form{margin:0;}
  .account-page .sidebar-logout-form button{
    display:inline-flex;padding:0;border:none;border-bottom:1px solid var(--rule);background:transparent;
    font-family:inherit;font-size:0.92rem;color:var(--slate);cursor:pointer;width:fit-content;
  }
  .account-page .sidebar-logout-form button:hover{color:var(--ink);border-color:var(--ink);}
  .account-page .progress-list{list-style:none;margin:0;padding:0;display:grid;gap:0.75rem;}
  .account-page .progress-list li{display:flex;align-items:center;gap:0.65rem;font-size:0.92rem;color:var(--slate);}
  .account-page .progress-list li.active{color:var(--ink);font-weight:500;}
  .account-page .progress-dot{width:0.45rem;height:0.45rem;border-radius:50%;background:var(--rule);flex-shrink:0;}
  .account-page .progress-list li.done .progress-dot{background:var(--ink);}
  .account-page .progress-list li.active .progress-dot{background:var(--blue);}
  .account-page .progress-meta{font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--slate);}
  .account-page .progress-list li.active .progress-meta{color:var(--blue);}
  .account-page .checkbox-row{display:flex;align-items:flex-start;gap:0.65rem;font-size:0.92rem;line-height:1.65;color:var(--ink);}
  .account-page .checkbox-row input{margin-top:0.2rem;accent-color:var(--blue);}
  .account-page .checkbox-help{display:block;margin-top:0.25rem;font-size:0.86rem;color:var(--slate);}
  .account-page .btn-outline{display:inline-flex;align-items:center;background:transparent;color:var(--ink);border:1px solid var(--rule);border-radius:999px;padding:0.75rem 1.4rem;font-family:inherit;font-size:0.88rem;font-weight:500;cursor:pointer;transition:background 0.15s,border-color 0.15s;}
  .account-page .btn-outline:hover{background:var(--blue-light);border-color:var(--blue);}
  .account-page .stat-grid--single{grid-template-columns:minmax(0,12rem);}
  .account-page .submission-card{margin-bottom:1.5rem;}
  .account-page .submission-meta{margin:0 0 1rem;font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--slate);}
  .account-page .submission-layout{display:grid;gap:1.5rem;}
  @media(min-width:720px){.account-page .submission-layout{grid-template-columns:minmax(0,22rem) minmax(0,1fr);align-items:start;}}
  .account-page .quote-picker{display:grid;gap:0.55rem;margin-top:0.75rem;}
  .account-page .quote-option{width:100%;border:1px solid var(--rule);background:#fff;border-radius:0.75rem;padding:0.85rem 1rem;text-align:left;font-family:inherit;font-size:0.88rem;line-height:1.55;color:var(--slate);cursor:pointer;transition:border-color 0.15s,background 0.15s,color 0.15s;}
  .account-page .quote-option:hover{border-color:rgba(31,73,214,0.35);background:var(--blue-light);color:var(--ink);}
  .account-page .quote-option.is-active{border-color:var(--blue);background:var(--blue);color:#fff;}
  .account-page .review-list{list-style:none;margin:0.75rem 0 0;padding:0;display:grid;gap:0.75rem;}
  .account-page .review-list li{border:1px solid var(--rule);border-radius:0.9rem;background:var(--blue-light);padding:0.85rem 1rem;}
  .account-page .review-list .name{margin:0;font-size:0.92rem;font-weight:500;color:var(--ink);}
  .account-page .review-list .status{margin:0.35rem 0 0;font-size:0.68rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);}
  .account-page .review-list .status.is-rejected{color:var(--slate);}
  .account-page .form-actions{display:flex;flex-wrap:wrap;align-items:center;gap:0.75rem;margin-top:1.25rem;}
  .account-page .form-actions form{margin:0;}
  .account-page .card--compact{padding:1rem 1.1rem;margin-bottom:1rem;}
  .account-page .field-label--flush{margin-top:0;}
  .account-page .field-help--tight{margin:0;}
  .account-page :focus-visible{outline:2px solid var(--blue);outline-offset:3px;}
  .account-page .textlink--touch{display:inline-flex;align-items:center;min-height:2.75rem;}
  @media(max-width:640px){
    .account-page{padding:1.25rem 0 2.5rem;}
    .account-page .wrap{width:calc(100% - 2rem);max-width:none;}
    .account-page .grid{gap:2rem;}
    .account-page h1{font-size:clamp(1.85rem,8vw,2.4rem);margin-bottom:1.25rem;}
    .account-page h2{font-size:clamp(1.3rem,5.5vw,1.65rem);line-height:1.2;}
    .account-page .card{padding:1.25rem 1.15rem;border-radius:1.25rem;margin-bottom:1.15rem;}
    .account-page .card-label{margin-bottom:0.6rem;}
    .account-page .stat-grid{gap:0.75rem;margin:1rem 0;}
    .account-page .stat{padding:0.9rem 1rem;}
    .account-page .stat-value{font-size:1.75rem;}
    .account-page .actions{flex-direction:column;align-items:stretch;gap:0.55rem;margin:1rem 0;}
    .account-page .actions--touch .textlink--touch{
      justify-content:center;width:100%;min-height:2.85rem;padding:0.55rem 1rem;
      border:1px solid var(--rule);border-radius:0.75rem;background:#fff;text-align:center;
    }
    .account-page .actions--touch .textlink--touch:hover{border-color:var(--blue);background:var(--blue-light);}
    .account-page .btn,.account-page .btn-outline{
      justify-content:center;width:100%;min-height:2.85rem;padding:0.85rem 1.25rem;
    }
    .account-page .link-row{flex-direction:column;align-items:stretch;gap:0.5rem;}
    .account-page .link-box{
      white-space:normal;word-break:break-all;line-height:1.45;
      font-size:0.82rem;padding:0.9rem 1rem;
    }
    .account-page .copy-btn{width:100%;min-height:2.85rem;padding:0.85rem 1rem;}
    .account-page .field-label{margin-top:1.15rem;}
    .account-page .field-help{font-size:0.88rem;}
    .account-page .note{font-size:0.88rem;}
    .account-page .lede{font-size:0.95rem;margin-bottom:1.5rem;}
    .account-page .progress-list li{align-items:flex-start;gap:0.55rem;line-height:1.45;}
    .account-page .progress-list .progress-meta{margin-left:auto;flex-shrink:0;}
    .account-page .sidebar{
      border-top:1px solid var(--rule);margin-top:0.5rem;padding:1.25rem 1.15rem;
      border-radius:1.25rem;background:var(--blue-light);
    }
    .account-page .sidebar-nav{gap:0.35rem;margin-top:0.5rem;}
    .account-page .sidebar-nav a{
      display:flex;align-items:center;width:100%;min-height:2.85rem;
      padding:0.45rem 0;border-bottom:none;border-radius:0.55rem;
    }
    .account-page .sidebar-nav a:hover{background:rgba(255,255,255,0.65);}
  }

  .profile-setup-page .profile-setup-wrap{max-width:36rem;}
  .profile-setup-page .setup-section{margin-bottom:1.25rem;}
  .profile-setup-page .field{margin-bottom:1.25rem;}
  .profile-setup-page .field label{display:block;font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);margin-bottom:0.45rem;}
  .profile-setup-page .field .errorlist{list-style:none;margin:0.45rem 0 0;padding:0;font-size:0.82rem;color:var(--slate);}
  .profile-setup-page .forma-input,
  .profile-setup-page input[type="text"],
  .profile-setup-page input[type="email"],
  .profile-setup-page input[type="tel"],
  .profile-setup-page input[type="file"],
  .profile-setup-page select{width:100%;border:1px solid var(--rule);background:#fff;border-radius:0.55rem;padding:0.85rem 1rem;font-family:inherit;font-size:0.95rem;color:var(--ink);transition:border-color 0.15s,box-shadow 0.15s;}
  .profile-setup-page .forma-input:focus,
  .profile-setup-page input[type="text"]:focus,
  .profile-setup-page input[type="email"]:focus,
  .profile-setup-page input[type="tel"]:focus,
  .profile-setup-page select:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(31,73,214,0.08);}
  .profile-setup-page .radio-row{display:flex;flex-wrap:wrap;gap:1rem;margin-top:0.5rem;}
  .profile-setup-page .radio-option{display:inline-flex;align-items:center;gap:0.45rem;font-size:0.92rem;font-weight:400;letter-spacing:0;text-transform:none;color:var(--ink);}
  .profile-setup-page .radio-option input{accent-color:var(--blue);}
  .profile-setup-page .alert{border:1px solid var(--rule);background:var(--blue-light);border-radius:0.75rem;padding:1rem 1.1rem;margin-bottom:1.25rem;}
  .profile-setup-page .alert-title{font-size:0.7rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue);margin:0 0 0.55rem;}
  .profile-setup-page .forma-combobox{position:relative;}
  .profile-setup-page .forma-combobox label{display:block;font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink);margin-bottom:0.45rem;}
  .profile-setup-page .forma-combobox select.forma-input{width:100%;}
  .profile-setup-page .forma-combobox--enhanced select.forma-input{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;opacity:0;pointer-events:none;}
  .profile-setup-page .forma-combobox [data-combobox-trigger]{display:none;width:100%;align-items:center;justify-content:space-between;gap:0.75rem;border:1px solid var(--rule);background:#fff;border-radius:0.55rem;padding:0.85rem 1rem;text-align:left;font-family:inherit;font-size:0.95rem;font-weight:400;color:var(--ink);cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
  .profile-setup-page .forma-combobox--enhanced [data-combobox-trigger]{display:flex;}
  .profile-setup-page .forma-combobox [data-combobox-trigger]:hover{border-color:rgba(31,73,214,0.3);}
