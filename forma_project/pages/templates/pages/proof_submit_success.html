{% extends "base.html" %}
{% block title %}Thanks — Forma{% endblock %}
{% block body %}
<section class="border-t border-rule bg-paper px-4 py-10 sm:px-[4rem] sm:py-[5rem]">
  <div class="mx-auto w-full max-w-5xl text-center">
    <h1 class="m-0 font-display text-[clamp(2.2rem,8vw,4rem)] leading-[0.95] tracking-[0.02em] text-ink">
      You're a good client.
    </h1>
    <p class="mx-auto mt-5 mb-0 max-w-2xl font-body text-[0.95rem] font-light leading-relaxed text-slate">
      Your video is with {% if profile.first_name %}{{ profile.first_name }}{% else %}your trainer{% endif %} for review. He'll be in touch.
    </p>
  </div>
</section>
{% endblock %}
